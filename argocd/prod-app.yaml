apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: phoenix-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Phoenix-Event-Ticketing/phoenix-online-platform-config.git
    targetRevision: main
    path: environments/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: phoenix-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
