apiVersion: v1
kind: ResourceQuota
metadata:
  name: phoenix-prod-quota
  namespace: phoenix-prod
  labels:
    app.kubernetes.io/part-of: phoenix-platform
    environment: prod
spec:
  hard:
    pods: "30"
    services: "20"
    persistentvolumeclaims: "10"
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
