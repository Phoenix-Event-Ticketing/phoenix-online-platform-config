apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: phoenix-api
  labels:
    app.kubernetes.io/part-of: phoenix-platform
    environment: prod
spec:
  parentRefs:
    - name: phoenix-prod
      sectionName: https
  hostnames:
    - api.phoenix-project.online
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /inventory
      backendRefs:
        - name: inventory-service
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /users
      backendRefs:
        - name: user-service
          port: 3000
    - matches:
        - path:
            type: PathPrefix
            value: /bookings
      backendRefs:
        - name: booking-service
          port: 8083
    - matches:
        - path:
            type: PathPrefix
            value: /events
      backendRefs:
        - name: event-service
          port: 8081
    - matches:
        - path:
            type: PathPrefix
            value: /payments
      backendRefs:
        - name: payment-service
          port: 4002
    - matches:
        - path:
            type: PathPrefix
            value: /refunds
      backendRefs:
        - name: payment-service
          port: 4002
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: phoenix-root-api
          port: 8080
