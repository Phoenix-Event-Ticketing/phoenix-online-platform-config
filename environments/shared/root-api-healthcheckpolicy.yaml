apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: phoenix-root-api-healthcheck
spec:
  default:
    checkIntervalSec: 10
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 3
    config:
      type: HTTP
      httpHealthCheck:
        requestPath: /
        portSpecification: USE_SERVING_PORT
  targetRef:
    group: ""
    kind: Service
    name: phoenix-root-api
