apiVersion: apps/v1
kind: Deployment
metadata:
  name: phoenix-root-api
  labels:
    app.kubernetes.io/name: phoenix-root-api
    app.kubernetes.io/component: gateway-root
    app.kubernetes.io/part-of: phoenix-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: phoenix-root-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: phoenix-root-api
        app.kubernetes.io/component: gateway-root
        app.kubernetes.io/part-of: phoenix-platform
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: root-api
          image: python:3.12-alpine
          command:
            - python
            - -c
            - |
              from http.server import BaseHTTPRequestHandler, HTTPServer
              import json

              payload = {
                  "service": "phoenix ticketing api",
                  "status": "ok",
                  "message": "Your gateway to bookings, events, payments, inventory, and users.",
                  "version": "1.0.0",
                  "endpoints": ["/users", "/bookings", "/events", "/payments", "/inventory"],
              }

              class Handler(BaseHTTPRequestHandler):
                  def do_GET(self):
                      body = json.dumps(payload, separators=(",", ":")).encode("utf-8")
                      self.send_response(200)
                      self.send_header("Content-Type", "application/json")
                      self.send_header("Content-Length", str(len(body)))
                      self.end_headers()
                      self.wfile.write(body)

                  def log_message(self, format, *args):
                      return

              HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
              ephemeral-storage: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
              ephemeral-storage: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
