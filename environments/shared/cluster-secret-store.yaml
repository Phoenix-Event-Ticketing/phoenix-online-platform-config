# Workload Identity: bind a GCP SA with secretmanager.secretAccessor to the ESO K8s SA.
# Replace REPLACE_* before applying.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: phoenix-gcp
spec:
  provider:
    gcpsm:
      projectID: REPLACE_GCP_PROJECT_ID
      auth:
        workloadIdentity:
          clusterLocation: REPLACE_GKE_REGION
          clusterName: REPLACE_GKE_CLUSTER_NAME
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets-system
