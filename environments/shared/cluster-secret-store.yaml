# Workload Identity: bind a GCP SA with secretmanager.secretAccessor to the ESO K8s SA.
# Replace REPLACE_* before applying.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: phoenix-gcp
spec:
  provider:
    gcpsm:
      projectID: phoenix-event-booking
      auth:
        workloadIdentity:
          clusterLocation: asia-south1
          clusterName: phoenix-event-cluster
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets-system
