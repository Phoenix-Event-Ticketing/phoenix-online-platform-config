apiVersion: v1
kind: ResourceQuota
metadata:
  name: phoenix-dev-quota
  namespace: phoenix-dev
  labels:
    app.kubernetes.io/part-of: phoenix-platform
    environment: dev
spec:
  hard:
    pods: "10"
    services: "10"
    persistentvolumeclaims: "8"
    requests.cpu: "2"
    requests.memory: 2Gi
    limits.cpu: "4"
    limits.memory: 4Gi
