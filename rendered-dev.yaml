apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  labels:
    app.kubernetes.io/part-of: phoenix-platform
    environment: dev
  name: phoenix-dev
  namespace: phoenix-dev
spec:
  gatewayClassName: gke-l7-global-external-managed
  listeners:
  - allowedRoutes:
      namespaces:
        from: Same
    hostname: api-dev.phoenix-project.online
    name: https
    port: 443
    protocol: HTTPS
    tls:
      certificateRefs:
      - group: ""
        kind: Secret
        name: phoenix-dev-gateway-tls
      mode: Terminate
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  labels:
    app.kubernetes.io/part-of: phoenix-platform
    environment: dev
  name: phoenix-api
  namespace: phoenix-dev
spec:
  hostnames:
  - api-dev.phoenix-project.online
  parentRefs:
  - name: phoenix-dev
    sectionName: https
  rules:
  - backendRefs:
    - name: inventory-service
      port: 8080
    matches:
    - path:
        type: PathPrefix
        value: /inventory
  - backendRefs:
    - name: user-service
      port: 3000
    matches:
    - path:
        type: PathPrefix
        value: /users
  - backendRefs:
    - name: booking-service
      port: 8083
    matches:
    - path:
        type: PathPrefix
        value: /bookings
  - backendRefs:
    - name: event-service
      port: 8081
    matches:
    - path:
        type: PathPrefix
        value: /api/v1/events
  - backendRefs:
    - name: payment-service
      port: 4002
    matches:
    - path:
        type: PathPrefix
        value: /payments
  - backendRefs:
    - name: payment-service
      port: 4002
    matches:
    - path:
        type: PathPrefix
        value: /refunds
