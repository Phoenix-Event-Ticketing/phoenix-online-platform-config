apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/component: database
    app.kubernetes.io/name: booking-service-mongodb
    app.kubernetes.io/part-of: phoenix-platform
    environment: dev
  name: booking-service-mongodb
  namespace: phoenix-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: booking-service-mongodb
      environment: dev
  serviceName: booking-service-mongodb
  template:
    metadata:
      labels:
        app.kubernetes.io/component: database
        app.kubernetes.io/name: booking-service-mongodb
        app.kubernetes.io/part-of: phoenix-platform
        environment: dev
    spec:
      containers:
      - env:
        - name: MONGO_INITDB_ROOT_USERNAME
          value: root
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              key: MONGO_INITDB_ROOT_PASSWORD
              name: booking-service-mongodb-secrets
        - name: MONGO_INITDB_DATABASE
          value: booking_db
        image: mongo:7.0
        imagePullPolicy: IfNotPresent
        livenessProbe:
          initialDelaySeconds: 45
          periodSeconds: 20
          tcpSocket:
            port: mongodb
          timeoutSeconds: 5
        name: mongodb
        ports:
        - containerPort: 27017
          name: mongodb
          protocol: TCP
        readinessProbe:
          initialDelaySeconds: 15
          periodSeconds: 10
          tcpSocket:
            port: mongodb
          timeoutSeconds: 5
        resources:
          limits:
            cpu: 250m
            memory: 256Mi
          requests:
            cpu: 125m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsGroup: 999
          runAsNonRoot: true
          runAsUser: 999
        volumeMounts:
        - mountPath: /data/db
          name: data
      securityContext:
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
  volumeClaimTemplates:
  - metadata:
      labels:
        environment: dev
      name: data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
      storageClassName: standard
