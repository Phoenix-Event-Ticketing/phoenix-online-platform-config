apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: api
    app.kubernetes.io/name: booking-service
    app.kubernetes.io/part-of: phoenix-platform
    environment: dev
  name: booking-service
  namespace: phoenix-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: booking-service
      environment: dev
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/component: api
        app.kubernetes.io/name: booking-service
        app.kubernetes.io/part-of: phoenix-platform
        environment: dev
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - preference:
              matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values:
                - asia-south1-a
            weight: 100
      containers:
      - env:
        - name: APP_ENV
          value: dev
        - name: LOG_LEVEL
          value: DEBUG
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              key: MONGODB_URI
              name: booking-service-secrets
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              key: JWT_SECRET
              name: booking-service-secrets
        envFrom:
        - configMapRef:
            name: booking-service-config
        image: asia-south1-docker.pkg.dev/phoenix-event-booking/phoenix-images/booking-service:dev-latest
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /actuator/health/liveness
            port: http
          initialDelaySeconds: 60
          periodSeconds: 20
          timeoutSeconds: 3
        name: booking-service
        ports:
        - containerPort: 8083
          name: http
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /actuator/health/readiness
            port: http
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 3
        resources:
          limits:
            cpu: 400m
            memory: 512Mi
          requests:
            cpu: 75m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
---
