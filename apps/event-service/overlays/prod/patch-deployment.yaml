apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-service
spec:
  replicas: 1
  template:
    metadata:
      labels:
        environment: prod
    spec:
      containers:
        - name: event-service
          env:
            - name: NODE_ENV
              value: production
            - name: LOG_LEVEL
              value: info
          resources:
            requests:
              cpu: 75m
              memory: 128Mi
            limits:
              cpu: 400m
              memory: 512Mi
