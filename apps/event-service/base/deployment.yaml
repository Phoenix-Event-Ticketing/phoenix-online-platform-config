apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-service
  labels:
    app.kubernetes.io/name: event-service
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: phoenix-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: event-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: event-service
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: phoenix-platform
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: event-service
          image: asia-south1-docker.pkg.dev/phoenix-event-booking/phoenix-images/event-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          envFrom:
            - configMapRef:
                name: event-service-config
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: event-service-secrets
                  key: MONGO_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: event-service-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
