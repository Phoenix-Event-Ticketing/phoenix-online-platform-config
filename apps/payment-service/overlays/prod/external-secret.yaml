apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: payment-service-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: phoenix-gcp
    kind: ClusterSecretStore
  target:
    name: payment-service-secrets
    creationPolicy: Owner
  data:
    - secretKey: MONGO_URI
      remoteRef:
        key: REPLACE_GSM_PAYMENT_MONGO_URI
    - secretKey: JWT_SECRET
      remoteRef:
        key: REPLACE_GSM_PAYMENT_JWT_SECRET
