    app.kubernetes.io/name: booking-service-mongodb
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: phoenix-platform
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: booking-service-mongodb
  ports:
    - name: mongodb
      port: 27017
      targetPort: mongodb
      protocol: TCP
