apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  labels:
    app.kubernetes.io/name: booking-service
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: phoenix-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: booking-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: booking-service
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: phoenix-platform
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: booking-service
          image: asia-south1-docker.pkg.dev/phoenix-event-booking/phoenix-images/booking-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: booking-service-config
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: booking-service-secrets
                  key: MONGODB_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: booking-service-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
