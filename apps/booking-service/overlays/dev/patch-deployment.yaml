apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
spec:
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        environment: dev
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - asia-south1-a
      containers:
        - name: booking-service
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: DEBUG
          resources:
            requests:
              cpu: 75m
              memory: 256Mi
            limits:
              cpu: 400m
              memory: 512Mi
