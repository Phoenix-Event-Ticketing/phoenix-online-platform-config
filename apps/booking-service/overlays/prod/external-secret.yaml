apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: booking-service-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: phoenix-gcp
    kind: ClusterSecretStore
  target:
    name: booking-service-secrets
    creationPolicy: Owner
  data:
    - secretKey: MONGODB_URI
      remoteRef:
        key: mongo-booking-uri
    - secretKey: JWT_SECRET
      remoteRef:
        key: prod-jwt-secret
