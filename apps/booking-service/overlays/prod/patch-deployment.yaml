apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
spec:
  replicas: 1
  template:
    metadata:
      labels:
        environment: prod
    spec:
      containers:
        - name: booking-service
          env:
            - name: APP_ENV
              value: prod
            - name: LOG_LEVEL
              value: INFO
          resources:
            requests:
              cpu: 75m
              memory: 256Mi
            limits:
              cpu: 400m
              memory: 512Mi
