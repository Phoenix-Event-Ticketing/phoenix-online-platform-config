apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
spec:
  replicas: 2
  template:
    metadata:
      labels:
        environment: prod
    spec:
      containers:
        - name: booking-service
          env:
            - name: APP_ENV
              value: prod
            - name: LOG_LEVEL
              value: INFO
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
