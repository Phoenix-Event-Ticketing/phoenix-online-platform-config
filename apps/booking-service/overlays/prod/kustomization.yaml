apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: phoenix-prod
commonLabels:
  environment: prod
resources:
  - ../../base
  - external-secret.yaml
  - mongodb-external-secret.yaml
patches:
  - path: patch-deployment.yaml
  - path: patch-configmap.yaml
  - path: patch-mongodb-storage.yaml
images:
  - name: asia-south1-docker.pkg.dev/phoenix-event-booking/phoenix-images/booking-service
    newTag: v1.0.0
