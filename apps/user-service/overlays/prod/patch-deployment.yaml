apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
spec:
  replicas: 2
  template:
    metadata:
      labels:
        environment: prod
    spec:
      containers:
        - name: user-service
          env:
            - name: APP_ENV
              value: prod
            - name: LOG_LEVEL
              value: INFO
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
